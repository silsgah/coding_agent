model:
  name: "Qwen/Qwen2-7B"
  device: "cuda"
  max_new_tokens: 512
  backend: "transformers"       # "transformers" or "vllm"
  lora:
    r: 16
    alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    dropout: 0.05
    checkpoint_path: "lora_checkpoints"

repo:
  paths:
    - "./my_project"
  file_types: [".py", ".ipynb"]

agent:
  max_steps: 6
  enable_tests: true
  max_context_files: 5
  max_prompt_length: 4096

session:
  session_dir: ".mini-coding-agent/sessions"
  max_history_chars: 12000
  max_tool_output: 4000
  max_depth: 1                   # subagent recursion limit

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]